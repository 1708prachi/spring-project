<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charser="UTF-8">
	<title>USER DATA TABLE</title>

	
	<!--  DATA TABLES LIBRARY -->
	<link href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css" rel="stylesheet"/>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	<script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>

	<!--  SWEET ALERT LIBRARY -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
	<div>DISPLAY USERS</div>
	<table id="usertable" class="table table-striped">
		<thead>
			<tr>
				<th>ID</th>
			    <th>USER NAME</th>
			    <th>EMAIL</th>
			    <th>PASSWORD</th>
				<th>ACTION</th>

			 </tr>
		</thead>
		<tbody>

		<tr th:each="user:${listUsers}">
			<td th:text="${user.id}"></td>
			<td th:text="${user.username}"></td>
			<td th:text="${user.email}"></td>
			<td th:text="${user.password}"></td>
			<td>
				<a th:href="@{/showformforupdate/{id}(id=${user.id})}"
				   class="btn btn-sm btn-warning">Edit</a>

			                    <a th:href="@{/deleteuser/{id}(id=${user.id})}"
			                       class="btn btn-sm btn-danger"
			                       onclick="return confirm('Are you sure?')">Delete</a>
			                </td>		</tr>

		<tfoot>
			<tr>
				<th>ID</th>
				<th>USER NAME</th>
				<th>EMAIL</th>
				<th>PASSWORD</th>
				<th>ACTION</th>
			</tr>
		</tfoot>
	</table>
	<button type="button" onclick="sweetalert();">click me</button>    
	    <script>
	    	new DataTable('#usertable');
	    </script>
	    <script>
	    		function sweetalert(){
					Swal.fire({
					  title: "Good job!",
					  text: "You clicked the button!",
					  icon: "success"
					});
	    			
	    		}
	    </script>
</body>
</html>
